name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}

      # Phase 2 — publish to the official krew-index. Disabled: name `ice`
      # collides with the upstream plugin. This repo is its own krew index
      # (plugins/ice.yaml is committed by the krews goreleaser publisher).
      - name: Update krew-index
        if: false
        uses: rajatjindal/krew-release-bot@v0.0.46
